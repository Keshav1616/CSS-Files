<!DOCTYPE html>
<html lang="en">
<head>
  <title>Glassmorphic Profile Card</title>
  <style>
    body {
      margin: 0;
      
    }
  </style>
</head>
<body>
<div padding: 0;
background-color: #000;
font-family: sans-serif;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
overflow: hidden;
position: relative;>
  <div style="position:relative; z-index:2; width:300px; background:rgba(255, 255, 255, 0.1); border-radius:15px; overflow:hidden; box-shadow:0 8px 32px rgba(0,0,0,0.6); text-align:center; color:white; backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.15);">
    
    <div style="height:140px; background:url('https://i.ibb.co/sFvG2gC/bokeh.jpg') no-repeat center/cover; position:relative;">
      <img src="https://i.ibb.co/7yzHk9G/male-profile.jpg" alt="John Doe" style="width:80px; height:80px; border-radius:50%; border:3px solid #fff; position:absolute; bottom:-40px; left:50%; transform:translateX(-50%);" />
    </div>
    
    <div style="padding:60px 20px 20px;">
      <h2 style="margin:10px 0 5px;">John Doe</h2>
      <p style="margin:0 0 15px; color:#ccc;">UI/UX Designer</p>
      
      <div style="font-size:14px; color:#aaa; line-height:1.6;">
        <p> New York, USA</p>
        <p> Amazon Co.</p>
        <p> alex@amazon.com</p>
      </div>
      
      <button style="margin-top:15px; padding:10px 25px; background:linear-gradient(to right, #ff6600, #ff9900); color:#fff; border:none; border-radius:5px; cursor:pointer;">Read More</button>
    </div>
  </div>

  <div style="position:absolute; bottom:-100px; right:-100px; width:400px; height:400px; background:radial-gradient(circle at center, #ff6600, #ff3300); border-radius:50%; z-index:1;"></div>
</div>
</body>
</html>
